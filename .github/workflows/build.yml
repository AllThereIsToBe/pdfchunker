name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  desktop-build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Smoke test CLI
        run: npm run test:help

      - name: Build unpacked desktop app
        run: npm run dist:dir

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pdfchunker-${{ matrix.os }}
          path: dist/
          if-no-files-found: error
